name: Release and Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://npm.pkg.github.com"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches package version
        shell: bash
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          OWNER_SCOPE="@${GITHUB_REPOSITORY_OWNER,,}/"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$PACKAGE_NAME" != ${OWNER_SCOPE}* ]]; then
            echo "package.json name ($PACKAGE_NAME) must be scoped to repository owner (${OWNER_SCOPE}...)."
            exit 1
          fi
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # `dist/` is gitignored; the published tarball must be built in CI. package.json "files" lists `dist` only
      - name: Build package (output to dist/)
        run: npm run build

      - name: Test (against dist/)
        run: node --test test/**/*.test.mjs

      # - name: Verify npm pack includes dist
      #   run: |
      #     set -euo pipefail
      #     test -d dist
      #     test -f dist/index.js
      #     TARBALL=$(npm pack 2>&1 | tail -n1)
      #     tar -tzf "$TARBALL" | grep -q "package/dist/index.js"
      #     tar -tzf "$TARBALL" | grep -q "package/dist/index.cjs"
      #     tar -tzf "$TARBALL" | grep -q "package/dist/index.d.ts"
      #     echo "Packing contains dist/ as required."
      #     rm -f "$TARBALL"

      - name: Publish package to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
